name: build-package-publish

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

jobs:
  compile:
    runs-on: ubuntu-latest
    outputs:
      coverage-badge: ${{ steps.badge-output.outputs.coverage-badge }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'adopt'
          server-id: github

      - name: Compile project
        run: ./mvnw clean install

      # --- Simulated coverage ---
      - name: Generate coverage
        id: coverage
        run: |
          # Replace with real coverage extraction
          COVERAGE=$((RANDOM % 40 + 60))
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      # --- Determine status ---
      - name: Set build status
        id: status
        run: |
          echo "status=passing" >> $GITHUB_OUTPUT

      # --- Update Wiki ---
      - name: Update Wiki
        env:
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COVERAGE: ${{ steps.coverage.outputs.coverage }}
          COLOR: ${{ steps.color.outputs.color }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          WIKI_URL="https://x-access-token:${TOKEN}@github.com/${REPO}.wiki.git"

          git clone "$WIKI_URL" wiki
          cd wiki

          FILE="Home.md"

          # Ensure file exists
          if [ ! -f "$FILE" ]; then
            echo "# 📊 Project Status Dashboard" > "$FILE"
            echo "" >> "$FILE"
          fi

          # Remove existing section for this branch
          if grep -q "## 🌿 Branch: ${BRANCH}" "$FILE"; then
            awk -v branch="## 🌿 Branch: ${BRANCH}" '
              $0 == branch {skip=1; next}
              /^## 🌿 Branch:/ {skip=0}
              !skip {print}
            ' "$FILE" > temp.md
            mv temp.md "$FILE"
          fi

          # Append updated section (NO indentation!)
          echo "## 🌿 Branch: ${BRANCH}" >> "$FILE"
          echo "" >> "$FILE"
          echo "### Build Status" >> "$FILE"
          echo "![Build Status](https://github.com/${REPO}/actions/workflows/build-package-publish.yml/badge.svg?branch=${BRANCH})" >> "$FILE"
          echo "" >> "$FILE"
          echo "### Code Coverage" >> "$FILE"
          echo "![Coverage](https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}?style=flat)" >> "$FILE"
          echo "" >> "$FILE"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add "$FILE"

          if ! git diff --cached --quiet; then
            git commit -m "Update status for ${BRANCH}"
            git pull --rebase || true
            git push
          fi